services:
  postgres:
    image: postgres:15-alpine
    container_name: finmatrix-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-finmatrix}
      POSTGRES_USER: ${DB_USERNAME:-finmatrix_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-finmatrix_pass_change_me}
    volumes:
      - finmatrix_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-finmatrix_user} -d ${DB_NAME:-finmatrix}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: finmatrix-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@finmatrix.local
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres

volumes:
  finmatrix_pgdata:
