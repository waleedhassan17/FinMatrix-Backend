databases:
  - name: finmatrix-db
    plan: free
    databaseName: finmatrix
    user: finmatrix_user
    postgresMajorVersion: "15"
    region: oregon

services:
  - type: web
    name: finmatrix-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /api/v1/health
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finmatrix-db
          property: connectionString

      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: api/v1
      - key: APP_NAME
        value: FinMatrix

      - key: DB_SYNCHRONIZE
        value: "false"
      - key: DB_LOGGING
        value: "false"
      - key: DB_SSL
        value: "true"
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: DB_POOL_MAX
        value: "10"
      - key: DB_POOL_MIN
        value: "2"
      - key: DB_MIGRATIONS_RUN
        value: "true"

      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d

      - key: BCRYPT_ROUNDS
        value: "12"
      - key: THROTTLE_TTL
        value: "60"
      - key: THROTTLE_LIMIT
        value: "100"
      - key: COOKIE_SECRET
        generateValue: true

      - key: LOG_LEVEL
        value: info
      - key: LOG_PRETTY
        value: "false"

      - key: UPLOAD_MAX_SIZE_MB
        value: "5"
      - key: UPLOAD_STORAGE_PATH
        value: /tmp/storage

      - key: EMAIL_ENABLED
        value: "false"

      - key: SWAGGER_ENABLED
        value: "false"
      - key: SWAGGER_PATH
        value: api/docs
