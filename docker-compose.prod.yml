services:
  api:
    build: .
    image: finmatrix-backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      # Inside the compose network, reach the db service by name — NOT localhost.
      DB_HOST: postgres
    ports:
      - "${API_HOST_PORT:-3000}:3000"
    volumes:
      - ./storage:/app/storage

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - finmatrix_prod_pgdata:/var/lib/postgresql/data
    # No host port by default in prod - DB is only reachable on the compose network.
    # Uncomment to expose for debugging:
    # ports:
    #   - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  finmatrix_prod_pgdata:
