name: Acceptance

# Continuously proves the accounting core: spins up Postgres, runs migrations +
# seeds, boots the API, and runs the end-to-end acceptance suite on every push/PR.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  acceptance:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finmatrix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3000
      API_PREFIX: api/v1
      APP_URL: http://localhost:3000
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/finmatrix_test
      DB_SSL: 'false'
      JWT_SECRET: ci_jwt_secret_value_at_least_32_chars_long
      JWT_REFRESH_SECRET: ci_jwt_refresh_secret_at_least_32_chars_long
      COOKIE_SECRET: ci_cookie_secret_value_at_least_32_chars_long
      CORS_ORIGINS: http://localhost:3000
      EMAIL_ENABLED: 'false'
      SWAGGER_ENABLED: 'false'
      # Credentials the acceptance suite logs in with (see test/acceptance.ts).
      API_BASE: http://localhost:3000/api/v1
      ADMIN_EMAIL: metromatrix@gmail.com
      ADMIN_PASSWORD: '123456'
      RIDER_EMAIL: saim@metromatrix.com
      RIDER_PASSWORD: '123456'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run migrations
        run: npm run migration:run

      - name: Seed chart of accounts + acceptance demo data
        run: |
          npm run seed:coa
          npm run seed:metromatrix
          npm run seed:metromatrix:ledger

      - name: Build
        run: npm run build

      - name: Boot API and wait for health
        run: |
          npm run start:prod &
          npx wait-on -t 60000 http://localhost:3000/api/v1/health

      - name: Run acceptance suite
        run: npm run test:acceptance

      - name: Run unit tests
        run: npm test
